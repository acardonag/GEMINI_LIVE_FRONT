<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Paisa - PWA</title>
  <meta name="theme-color" content="#004481">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <meta name="description" content="Tu vendedor paisa virtual, siempre listo para ayudarte a comprar.">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }

    let deferredPrompt;
    const btnInstall = document.createElement('button');
    btnInstall.id = 'btn-install-pwa';
    btnInstall.className = 'paisa-btn';
    btnInstall.style.display = 'none';
    btnInstall.style.width = '100%';
    btnInstall.style.backgroundColor = '#fb8c00';
    btnInstall.innerText = '🏠 ¡Instálame en tu celular!';

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      btnInstall.style.display = 'block';
    });

    btnInstall.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('App instalada con éxito');
        }
        deferredPrompt = null;
        btnInstall.style.display = 'none';
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const main = document.querySelector('.paisa-main');
      if (main) main.appendChild(btnInstall);
    });
  </script>
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: #f4f6fa; color: #222; margin: 0; }
    .paisa-header { background: #004481; color: #fff; padding: 2rem 1rem 1rem 1rem; text-align: center; }
    .paisa-main { max-width: 420px; margin: 2rem auto; background: #fff; border-radius: 16px; box-shadow: 0 2px 16px #0001; padding: 2rem; }
    .paisa-btn { background: #004481; color: #fff; border: none; border-radius: 8px; padding: 1rem 2rem; font-size: 1.2rem; cursor: pointer; margin-top: 2rem; }
    .paisa-btn:active { background: #003366; }
  </style>
</head>
<body>
  <div class="paisa-header">
    <h1>👨‍🦱 El Paisa</h1>
    <p>¡Hola mijo! Soy tu vendedor paisa virtual.<br>¿En qué te puedo ayudar hoy?</p>
  </div>
  <main class="paisa-main">
    <form id="chat-form">
      <input id="user-input" type="text" placeholder="Pregúntame algo..." style="width:100%;padding:1rem;font-size:1.1rem;border-radius:8px;border:1px solid #ccc;">
      <button class="paisa-btn" type="submit">Enviar</button>
    </form>
    <div id="chat-log" style="margin-top:2rem;"></div>
  </main>
  <script>
    const chatForm = document.getElementById('chat-form');
    const chatLog = document.getElementById('chat-log');
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('user-input');
      const msg = input.value.trim();
      if (!msg) return;
      chatLog.innerHTML += `<div><b>Tú:</b> ${msg}</div>`;
      input.value = '';
      // Llama al backend del Paisa (ajusta el endpoint si es necesario)
      const res = await fetch('http://localhost:8000/paisa-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      chatLog.innerHTML += `<div><b>Paisa:</b> ${data.reply || '...'}</div>`;
      chatLog.scrollTop = chatLog.scrollHeight;
    });
  </script>
</body>
</html>
